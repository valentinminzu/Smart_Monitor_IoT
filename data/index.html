<html>

<head>
    <title>Monitor IoT</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }

        .card {
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            margin: 15px;
            width: 250px;
            display: inline-block;
        }

        span {
            font-size: 30x;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1> Statie Meteo Smart</h1>
    <div class="card">
        <p> Temperatura: <span id="valoare_temp">--</span> &deg;C</p>
    </div>
    <div class="card">
        <p> Umiditate: <span id="valoare_umiditate">--</span> %</p>
    </div>
    <div class="card">
        <p> Nivelul luminii: <span id="valoare_nivel_lumina">--</span></p>
    </div>
    <script>
        setInterval(function () {
            fetch('/temperatura')
                .then(Response => Response.text())
                .then(data => {
                    document.getElementById("valoare_temp").innerHTML = data;
                });
            fetch('/umiditate')
                .then(response => response.text())
                .then(data => {
                    document.getElementById("valoare_umiditate").innerHTML = data;
                });
        }, 5000);
    </script>
</body>
</html>
